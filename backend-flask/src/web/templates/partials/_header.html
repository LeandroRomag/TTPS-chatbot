<!-- Header -->

<!-- No se está utilizando -->

<header class="top-header py-2 px-4 d-flex align-items-center justify-content-between">
    <div class="d-flex align-items-center gap-3">
        <span class="text-white-50 small d-none d-md-block">
            <i class="bi bi-calendar3 me-1"></i>{{ current_date | default('') }}
        </span>
    </div>

    <div class="d-flex align-items-center gap-3">
        <!-- Notifications -->
        <div class="dropdown">
            <button class="btn btn-link text-white p-0 position-relative" type="button" data-bs-toggle="dropdown"
                aria-expanded="false">
                <i class="bi bi-bell fs-5"></i>
                {% if notification_count and notification_count > 0 %}
                <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger"
                    style="font-size: 0.6rem;">
                    {{ notification_count }}
                </span>
                {% endif %}
            </button>
            <ul class="dropdown-menu dropdown-menu-end">
                <li>
                    <h6 class="dropdown-header">Notificaciones</h6>
                </li>
                <li>
                    <hr class="dropdown-divider">
                </li>
                <li><a class="dropdown-item small text-muted" href="#">Sin notificaciones nuevas</a></li>
            </ul>
        </div>

        <!-- User Menu -->
        <div class="dropdown">
            <button class="btn btn-link text-white text-decoration-none p-0 d-flex align-items-center gap-2"
                type="button" data-bs-toggle="dropdown" aria-expanded="false">
                <div class="rounded-circle bg-white bg-opacity-25 d-flex align-items-center justify-content-center"
                    style="width: 32px; height: 32px;">
                    <i class="bi bi-person-fill"></i>
                </div>
                <span class="d-none d-md-block small">{{ current_user.name if current_user else 'Administrador'
                    }}</span>
                <i class="bi bi-chevron-down small"></i>
            </button>
            <ul class="dropdown-menu dropdown-menu-end">
                <li><a class="dropdown-item" href="#"><i class="bi bi-person me-2"></i>Mi perfil</a></li>
                <li><a class="dropdown-item" href="#"><i class="bi bi-gear me-2"></i>Configuración</a></li>
                <li>
                    <hr class="dropdown-divider">
                </li>
                <li><a class="dropdown-item text-danger" href="{{ url_for('authentication.logout') }}"><i
                            class="bi bi-box-arrow-right me-2"></i>Cerrar sesión</a></li>
            </ul>
        </div>
    </div>
</header>
