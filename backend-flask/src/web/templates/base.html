<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>{% block title %}Facultad de Informática{% endblock %}</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Header CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='styles/header.css') }}">

    {% block extra_styles %}{% endblock %}
</head>

<body class="bg-light">

    <!-- HEADER -->
    <header class="header-login">
        <div class="header-content">
            <img 
                src="{{ url_for('static', filename='img/logo-info.png') }}" 
                alt="Facultad de Informática"
                class="header-logo"
            >

            <img 
                src="{{ url_for('static', filename='img/logo_UNLP.jpg') }}" 
                alt="Universidad Nacional de La Plata"
                class="header-logo"
            >
        </div>
    </header>

    {% block body %}{% endblock %}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
    {% block extra_scripts %}{% endblock %}
</body>
</html>
