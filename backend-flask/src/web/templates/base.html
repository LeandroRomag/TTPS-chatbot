<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}{% endblock %}</title>

    <link rel="icon" type="image/jpeg" href="{{ url_for('static', filename='img/logo_facultad.jpg') }}">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.css" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='styles/base.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles/layout.css') }}">

    {% block extra_styles %}{% endblock %}
</head>
<body class="min-vh-100 d-flex">

<!-- Sidebar -->
<aside class="sidebar position-fixed top-0 bottom-0 start-0 d-flex flex-column justify-content-between text-white p-3">
    <div>
        <div class="mb-4 fw-bold">
            FACULTAD DE<br>INFORMÁTICA
        </div>

        <ul class="nav flex-column gap-1">

            <li>
                <a class="nav-link {% if active_page == 'usuarios' %}active{% endif %}"
                   href="{{ url_for('user.index') }}">
                    <i class="bi bi-people me-2"></i> Administradores
                </a>
            </li>

            <li>
                <a class="nav-link {% if active_page == 'documentos' %}active{% endif %}"
                   href="{{ url_for('document.index') }}">
                    <i class="bi bi-file-earmark-text me-2"></i> Documentos
                </a>
            </li>

            <li>
                <a class="nav-link" href="{{ url_for('system.pause') }}">
                    <i class="bi bi-pause-circle me-2"></i> Pausa del sistema
                </a>
            </li>

            <li>
                <a class="nav-link" href="{{ url_for('status.index') }}">
                    <i class="bi bi-activity me-2"></i> Estado del sistema
                </a>
            </li>

            <li>
                <a class="nav-link">
                    <i class="bi bi-journal-text me-2"></i> Logs
                </a>
            </li>
        </ul>
    </div>

    <div>
        <a class="nav-link" href="{{ url_for('authentication.logout') }}">
            <i class="bi bi-box-arrow-right me-2"></i> Cerrar sesión
        </a>
    </div>
</aside>

<!-- Main -->
<main class="main-content w-100 p-4 bg-light">
    {% block body %}{% endblock %}
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
{% block extra_scripts %}{% endblock %}
</body>
</html>
