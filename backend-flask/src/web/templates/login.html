<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <title>Iniciar Sesión - Facultad de Informática</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- CSS del login -->
    <link rel="stylesheet" href="{{ url_for('static', filename='styles/login.css') }}">
</head>

<body class="bg-light">

    <!-- Header LOGIN -->
    <header class="login-header">
        <div class="container">
            <div class="login-header-logos">
                <img src="{{ url_for('static', filename='img/logo-info.png') }}"
                    alt="Facultad de Informática"
                    class="login-logo">

                <img src="{{ url_for('static', filename='img/logo_UNLP.jpg') }}"
                    alt="Universidad Nacional de La Plata"
                    class="login-logo">
            </div>
        </div>
    </header>

    <!-- Login -->
    <main class="login-container">
        <div class="login-box">

            <h2 class="login-title">Iniciar Sesión</h2>

            <form method="POST" action="{{ url_for('authentication.login') }}">

                <input
                    type="email"
                    name="email"
                    placeholder="Correo electrónico"
                    class="login-input"
                    required
                >

                <input
                    type="password"
                    name="password"
                    placeholder="Contraseña"
                    class="login-input"
                    required
                >

                <button type="submit" class="login-btn">
                    Ingresar
                </button>
            </form>

            {% if error %}
                <div class="error-msg">
                    {{ error }}
                </div>
            {% endif %}
        </div>
    </main>

</body>
</html>
