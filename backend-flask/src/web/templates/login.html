{% extends "base.html" %}

{% block title %}Iniciar Sesión - Facultad de Informática{% endblock %}

{% block body %}

<link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">

<div class="login-container">
    <div class="login-box">

        <h2 class="login-title">Iniciar Sesion</h2>

        <form method="POST" action="{{ url_for('authentication.login') }}">

            <input 
                type="email" 
                name="email" 
                placeholder="Correo electronico" 
                class="login-input"
                required
            >

            <input 
                type="password" 
                name="password" 
                placeholder="Contraseña" 
                class="login-input"
                required
            >

            <button type="submit" class="login-btn">Ingresar</button>
        </form>

        {% if error %}
        <div class="error-msg">
            {{ error }}
        </div>
        {% endif %}
    </div>
</div>

{% endblock %}
